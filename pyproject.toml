[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "palari-company-os"
version = "0.1.0"
description = "Queue-first operating layer for AI-assisted company work."
requires-python = ">=3.10"
dependencies = []

[project.scripts]
palari = "palari_company_os.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

