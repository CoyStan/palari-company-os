      .soft { fill: #fbfcfd; stroke: #e2e8ee; stroke-width: 1.2; }
      .rail { fill: #ffffff; stroke: #d9e1e8; stroke-width: 1.2; }
      .title { fill: #0f172a; font: 700 26px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h2 { fill: #0f172a; font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h3 { fill: #263445; font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .05em; }
      .body { fill: #516070; font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #738191; font: 500 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #344154; font: 600 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .chip { fill: #eef6ff; stroke: #bdd7ff; stroke-width: 1; }
      .chipText { fill: #1d5ea8; font: 700 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .good { fill: #14916f; }
      .amber { fill: #d97706; }
      .blue { fill: #2563eb; }
      .red { fill: #dc2626; }
      .mutedLine { stroke: #e7edf2; stroke-width: 1; }
      .dark { fill: #0f172a; }
      .navText { fill: #344154; font: 700 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .button { fill: #ffffff; stroke: #ccd6e0; stroke-width: 1.2; }
      .buttonText { fill: #132238; font: 700 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
