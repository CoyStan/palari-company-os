  <g transform="translate(584 370)">
    <text class="h2">I. Introduction</text>
    <text y="36" class="body">Oakland's housing update is an opportunity to improve affordability,</text>
    <text y="58" class="body">approval clarity, and long-term community well-being.</text>
    <text y="112" class="h2">II. Support for Key Strategies</text>
    <circle cx="4" cy="146" r="2.5" class="dark"/>
    <text x="20" y="150" class="body">Preserve and expand affordable housing.</text>
    <circle cx="4" cy="178" r="2.5" class="dark"/>
    <text x="20" y="182" class="body">Increase approval certainty for middle housing and ADUs.</text>
    <circle cx="4" cy="210" r="2.5" class="dark"/>
    <text x="20" y="214" class="body">Invest in tenant protections and displacement prevention.</text>
    <text y="280" class="h2">III. Recommendation</text>
    <text y="316" class="body">Adopt objective standards and publish the approved result with receipt.</text>
  </g>

