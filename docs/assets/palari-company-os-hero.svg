<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Palari Company OS hero image</title>
  <desc id="desc">A professional AI company operating console with workbench explorer, artifact review, chat, receipts, authority, and history panels.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f9; }
