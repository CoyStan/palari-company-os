<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Palari blocks an out-of-bound file change</title>
  <desc id="desc">A compact dashboard view showing an AI agent stopped before changing deploy/production.yml.</desc>
  <rect width="1200" height="680" fill="#f6f8fa"/>
  <rect x="24" y="24" width="1152" height="48" rx="3" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="42" y="38" width="20" height="20" rx="3" fill="#24292f"/>
  <text x="76" y="56" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2328">Palari Company OS</text>
  <text x="1018" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#57606a">Read-only dashboard</text>

  <rect x="24" y="88" width="170" height="568" fill="#f6f8fa" stroke="#d0d7de"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#344054">
    <text x="54" y="136">Queue</text>
    <text x="54" y="178">Work</text>
    <text x="54" y="220">Trust</text>
    <text x="54" y="262">History</text>
    <text x="54" y="304">Authority</text>
  </g>
  <rect x="36" y="112" width="142" height="34" rx="3" fill="#ffffff" stroke="#0969da"/>

  <rect x="218" y="88" width="958" height="186" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="240" y="126" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" fill="#1f2328">What needs attention now</text>
  <rect x="240" y="148" width="216" height="32" rx="3" fill="#fff8f8" stroke="#cf222e"/>
  <text x="256" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#cf222e">BLOCKED outside boundary</text>
  <rect x="472" y="148" width="144" height="32" rx="3" fill="#fff8c5" stroke="#bf8700"/>
  <text x="489" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#9a6700">needs review</text>
  <line x1="240" y1="202" x2="858" y2="202" stroke="#d0d7de" stroke-dasharray="4 4"/>
  <text x="240" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#344054">Sofia tried to change deploy/production.yml.</text>
  <text x="240" y="254" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#344054">Allowed write path: docs/product/company-os.md.</text>
  <rect x="888" y="112" width="250" height="128" rx="4" fill="#fff8f8" stroke="#cf222e"/>
  <text x="910" y="144" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#cf222e">STOPPED</text>
  <text x="910" y="174" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#1f2328">deploy/production.yml</text>
  <text x="910" y="204" font-family="ui-monospace, monospace" font-size="13" fill="#57606a">agent check --changed ...</text>

  <rect x="218" y="298" width="958" height="326" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="240" y="338" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#1f2328">Prioritized work</text>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#1f2328">
    <rect x="240" y="366" width="896" height="56" fill="#ffffff" stroke="#d0d7de"/>
    <line x1="240" y1="366" x2="240" y2="422" stroke="#cf222e" stroke-width="5"/>
    <text x="262" y="392" font-weight="800">Prepare beta launch checklist</text>
    <text x="262" y="414" font-size="13" fill="#57606a">Human approval required before continuing.</text>

    <rect x="240" y="438" width="896" height="56" fill="#ffffff" stroke="#d0d7de"/>
    <line x1="240" y1="438" x2="240" y2="494" stroke="#bf8700" stroke-width="5"/>
    <text x="262" y="464" font-weight="800">Clean onboarding note copy</text>
    <text x="262" y="486" font-size="13" fill="#57606a">Focused verification expected for this change.</text>

    <rect x="240" y="510" width="896" height="56" fill="#ffffff" stroke="#d0d7de"/>
    <line x1="240" y1="510" x2="240" y2="566" stroke="#2da44e" stroke-width="5"/>
    <text x="262" y="536" font-weight="800">Summarize selected beta launch note</text>
    <text x="262" y="558" font-size="13" fill="#57606a">Ready for a human to review the output.</text>
  </g>
</svg>
