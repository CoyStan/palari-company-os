name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  candidate:
    name: Candidate gate (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install development tools
        run: python -m pip install "setuptools>=68" -e ".[dev]"

      - name: Verify candidate
        run: ./scripts/verify.sh complete

  compatibility:
    name: Python ${{ matrix.python-version }} compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Import source package
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -S -c "import palari_company_os; print(palari_company_os.__version__)"

      - name: Exercise pure governance kernel
        run: python -S -m unittest tests.test_governance_kernel

      - name: Exercise CLI parser
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -S -m palari_company_os --help
