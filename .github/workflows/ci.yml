name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Build and install wheel
        run: |
          python -m pip wheel --no-deps . -w dist
          python -m pip install --no-deps dist/palari_company_os-*.whl

      - name: Import package
        run: python -c "import palari_company_os; print(palari_company_os.__version__)"

      - name: Installed CLI smoke
        run: |
          palari --help
          palari validate --json
          palari queue --json
          palari --workspace examples/acme-company-os validate --json
          palari --workspace examples/acme-company-os queue --json

      - name: Isolated install smoke
        run: ./scripts/install_smoke.sh

      - name: Unit tests
        run: python -S -m unittest discover -s tests

      - name: Repository verification
        run: ./scripts/verify.sh
